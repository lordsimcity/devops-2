services:
  jenkins:
    build: .
    container_name: inf236-jenkins
    # Exception pédagogique locale : permet à Jenkins d'utiliser le socket Docker monté.
    # Ne pas reproduire cette configuration comme modèle de production.
    user: root
    ports:
      - '8088:8080'
    environment:
      JAVA_OPTS: '-Djenkins.install.runSetupWizard=false'
      JENKINS_ADMIN_ID: 'admin'
      JENKINS_ADMIN_PASSWORD: 'AdminJenkinsTP2026!'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/workspace/portal
      - ./init.groovy.d:/usr/share/jenkins/ref/init.groovy.d:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  jenkins_home:
